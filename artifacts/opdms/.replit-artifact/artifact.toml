kind = "web"
previewPath = "/"
title = "OPDMS — Out-Patient Document Management System"
version = "1.0.0"
id = "artifacts/opdms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18775
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/opdms run dev"

[services.env]
PORT = "18775"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/opdms", "run", "build"]
publicDir = "artifacts/opdms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
